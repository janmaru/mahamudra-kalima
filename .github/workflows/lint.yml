name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install ruff mypy types-requests

      - name: Lint with ruff
        run: |
          ruff check src/ tests/ --select=E,W,F,I

      - name: Type check with mypy
        run: |
          mypy src/kalima --ignore-missing-imports || true
